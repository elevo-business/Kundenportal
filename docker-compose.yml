version: '3.8'

services:
  portal:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-elevo2026!}
    volumes:
      - portal-data:/app/data
      - portal-uploads:/app/uploads
    restart: unless-stopped

volumes:
  portal-data:
  portal-uploads:
